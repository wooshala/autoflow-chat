name: Android Staff Release APK

# 신규 직원용 release-서명 APK를 빌드해 GitHub Release에 게시한다.
# 최초 트리거는 수동(workflow_dispatch)만. main push 자동 트리거는 아직 추가하지 않는다.
# 기존 Vercel/Web/시설고장/DB, 데스크톱 release-desktop.yml / latest.json 은 건드리지 않는다.

on:
  workflow_dispatch: {}

permissions:
  contents: write        # Release 생성/자산 업로드에 필요한 최소 권한만

concurrency:
  group: android-staff-release
  cancel-in-progress: false   # release 게시 중 취소로 인한 자산 손상 방지

jobs:
  build-release-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-staff
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1) 필수 Secret 사전 검사 — 하나라도 없으면 즉시 실패(값은 출력하지 않음).
      - name: Verify required secrets present
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PW:  ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PW: ${{ secrets.ANDROID_KEY_PASSWORD }}
          GS_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
        run: |
          missing=""
          [ -z "$KS_B64" ] && missing="$missing ANDROID_KEYSTORE_BASE64"
          [ -z "$KS_PW" ] && missing="$missing ANDROID_KEYSTORE_PASSWORD"
          [ -z "$KEY_ALIAS" ] && missing="$missing ANDROID_KEY_ALIAS"
          [ -z "$KEY_PW" ] && missing="$missing ANDROID_KEY_PASSWORD"
          [ -z "$GS_JSON" ] && missing="$missing ANDROID_GOOGLE_SERVICES_JSON"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            exit 1
          fi
          echo "all required secrets present"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # 2) Gradle 실행 환경 — wrapper 미커밋이므로 setup-gradle 로 Gradle 8.11.1 고정(AGP 8.7.3 호환).
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      # 3) keystore 복원(임시 파일, 워크스페이스 밖). 내용 미출력.
      - name: Restore keystore
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/autoflow-staff-release.jks"
          if [ ! -s "$RUNNER_TEMP/autoflow-staff-release.jks" ]; then echo "::error::keystore restore empty"; exit 1; fi

      # 4) google-services.json 복원(FCM 필수). 내용 미출력.
      - name: Restore google-services.json
        env:
          GS_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GS_JSON" | base64 -d > app/google-services.json
          if [ ! -s app/google-services.json ]; then echo "::error::google-services.json restore empty"; exit 1; fi
          echo "google-services.json restored (size: $(wc -c < app/google-services.json) bytes)"

      # 5) release APK 빌드(고정 키 서명). signing 은 build.gradle.kts 가 env 로 읽음.
      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/autoflow-staff-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle :app:assembleRelease --no-daemon --stacktrace

      # 6) APK 존재 + 서명/식별 검증
      - name: Verify APK (signing, package, version)
        id: verify
        run: |
          APK=app/build/outputs/apk/release/app-release.apk
          [ -f "$APK" ] || { echo "::error::release APK not found: $APK"; exit 1; }

          BUILD_TOOLS=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -1)
          APKSIGNER="$BUILD_TOOLS/apksigner"
          AAPT2="$BUILD_TOOLS/aapt2"

          echo "== apksigner verify =="
          "$APKSIGNER" verify --verbose --print-certs "$APK"
          CERT_SHA=$("$APKSIGNER" verify --print-certs "$APK" | grep -i "certificate SHA-256" | head -1 | awk '{print $NF}')

          echo "== badging =="
          BADGING=$("$AAPT2" dump badging "$APK")
          PKG=$(echo "$BADGING" | sed -n "s/.*package: name='\([^']*\)'.*/\1/p")
          VC=$(echo "$BADGING" | sed -n "s/.*versionCode='\([^']*\)'.*/\1/p")
          VN=$(echo "$BADGING" | sed -n "s/.*versionName='\([^']*\)'.*/\1/p")

          if [ "$PKG" != "com.autoflow.staff" ]; then echo "::error::unexpected package: $PKG"; exit 1; fi

          APK_SHA=$(sha256sum "$APK" | awk '{print $1}')

          echo "PKG=$PKG"; echo "VC=$VC"; echo "VN=$VN"; echo "CERT_SHA=$CERT_SHA"; echo "APK_SHA=$APK_SHA"
          {
            echo "pkg=$PKG"
            echo "vc=$VC"
            echo "vn=$VN"
            echo "cert_sha=$CERT_SHA"
            echo "apk_sha=$APK_SHA"
          } >> "$GITHUB_OUTPUT"

      # 7) 고정 파일명으로 스테이징
      - name: Stage APK as autoflow-staff.apk
        run: cp app/build/outputs/apk/release/app-release.apk "$GITHUB_WORKSPACE/autoflow-staff.apk"

      # 8) CI artifact 업로드(감사/보관)
      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: autoflow-staff-apk-${{ steps.verify.outputs.vc }}
          path: autoflow-staff.apk
          if-no-files-found: error

      # 9) 버전 이력 Release (먼저 성공해야 함). 저장소 전체 Latest 로 승격하지 않음.
      - name: Publish versioned Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ steps.verify.outputs.vn }}-${{ steps.verify.outputs.vc }}
          name: AutoFlow Staff Android v${{ steps.verify.outputs.vn }} (${{ steps.verify.outputs.vc }})
          make_latest: false
          files: autoflow-staff.apk
          body: |
            신규 직원용 AutoFlow Staff Android APK (release 서명).
            - source commit: ${{ github.sha }}
            - versionName: ${{ steps.verify.outputs.vn }}
            - versionCode: ${{ steps.verify.outputs.vc }}
            - package: ${{ steps.verify.outputs.pkg }}
            - APK SHA-256: ${{ steps.verify.outputs.apk_sha }}
            - signing cert SHA-256: ${{ steps.verify.outputs.cert_sha }}
            - workflow run: ${{ github.run_id }} (#${{ github.run_number }})
            설치: autoflow-staff.apk 다운로드 → 설치(출처 불명 앱 허용).

      # 10) 고정 직원 링크 Release(android-latest) — 버전 Release 성공 후에만 갱신.
      #     자산만 교체, make_latest=false, 데스크톱 latest/ latest.json 무영향.
      - name: Update fixed "android-latest" Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: AutoFlow Staff Android (latest)
          make_latest: false
          files: autoflow-staff.apk
          body: |
            신규 직원용 AutoFlow Staff 최신 APK. 이 링크는 항상 최신입니다:
            https://github.com/wooshala/autoflow-chat/releases/tag/android-latest
            현재 버전: v${{ steps.verify.outputs.vn }} (${{ steps.verify.outputs.vc }}) / commit ${{ github.sha }}
